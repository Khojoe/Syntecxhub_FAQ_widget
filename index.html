<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ Accordion Widget | Immanuel Oheneba Debe</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="faq-wrapper">

    <!-- HEADER -->
    <header class="faq-header">
      <span class="faq-tag">Help Center</span>
      <h1 class="faq-title">Frequently Asked Questions</h1>
      <p class="faq-subtitle">Click any question below to reveal the answer.</p>
      <div class="faq-divider"></div>
    </header>

    <!-- ACCORDION LIST -->
    <div class="faq-list" id="faqList" role="list"></div>

    <!-- FOOTER -->
    <footer class="faq-footer">
      <p>Built by <span>Immanuel Oheneba Debe</span> · <span id="year"></span></p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>

</html>
